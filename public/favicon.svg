<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Field Viewer icon</title>
  <desc id="desc">Two field packets crossing on a dark square.</desc>
  <defs>
    <linearGradient id="bg" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1622" />
      <stop offset="1" stop-color="#03060c" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <path d="M10 39c12-13 25-18 44-15" fill="none" stroke="#8cf0d4" stroke-width="2.5" stroke-linecap="round" opacity=".82" />
  <path d="M10 25c13 13 28 17 44 13" fill="none" stroke="#f5c77a" stroke-width="2.5" stroke-linecap="round" opacity=".78" />
  <circle cx="24" cy="32" r="6.5" fill="#8cf0d4" filter="url(#glow)" />
  <circle cx="41" cy="33" r="6.5" fill="#ff7aa8" filter="url(#glow)" />
  <path d="M20 32h8M37 33h8M41 29v8" stroke="#03060c" stroke-width="2" stroke-linecap="round" />
</svg>
